<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古文明冒險：吃金幣遊戲</title>
    <style>
        :root {
            --color-gold: #FFD700;
            --color-bronze: #E25822;
            --color-silver: #9370DB;
            --color-green: #2E8B57;
            --bg-sand: #F4E7CE;
            --bg-parchment: #FFFDF4;
            --text-dark: #4A3319;
        }

        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-sand);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(#dbcaa4 15%, transparent 16%), radial-gradient(#dbcaa4 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--bg-parchment);
            border: 6px solid #C4A482;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.18);
            padding: 25px;
            text-align: center;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        /* 頁面切換控制 */
        .page {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease-in-out;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--text-dark);
            font-size: 2.8rem;
            margin: 10px 0;
            text-shadow: 3px 3px 0px #F5DEB3;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #8B5A2B;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* 通用按鈕樣式 */
        .btn {
            font-size: 1.3rem;
            padding: 12px 35px;
            border-radius: 50px;
            border: 3px solid #8B5A2B;
            background-color: #FFA500;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0px #8B5A2B;
            transition: all 0.1s ease;
            margin: 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn:hover {
            background-color: #FFB52E;
            transform: translateY(2px);
            box-shadow: 0 4px 0px #8B5A2B;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #8B5A2B;
        }

        /* 第一頁：遊戲標題畫面 */
        #page-title .menu-box {
            background: #FDF5E6;
            border: 3px dashed #CD853F;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        }
        .option-group {
            margin-bottom: 25px;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .option-group label {
            font-size: 1.4rem;
            color: var(--text-dark);
            font-weight: bold;
        }
        .option-group select {
            font-size: 1.2rem;
            padding: 8px 15px;
            border-radius: 10px;
            border: 2px solid #CD853F;
            color: var(--text-dark);
            font-weight: bold;
            outline: none;
            width: 220px;
        }

        /* 第二頁：遊戲規則極簡排版 */
        .rules-list-container {
            max-width: 650px;
            margin: 30px auto;
            text-align: left;
        }
        .rule-item-box {
            background: white;
            border: 3px solid #D2B48C;
            border-radius: 20px;
            padding: 18px 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .rule-num {
            font-size: 2.2rem;
            font-weight: bold;
            color: #D2691E;
            min-width: 50px;
            height: 50px;
            background: #FFF3E0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #FFA500;
        }
        .rule-text {
            font-size: 1.25rem;
            line-height: 1.5;
            color: var(--text-dark);
        }
        .rule-text strong {
            color: #FF4500;
            background-color: #FFFFCC;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 第三頁：遊戲畫面 */
        .game-layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 20px;
            margin-top: 10px;
            width: 100%;
        }
        .side-panel {
            flex: 1;
            min-width: 220px;
            max-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .player-card {
            background: white;
            border: 4px solid #E0D0C0;
            border-radius: 18px;
            padding: 15px;
            text-align: left;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.04);
            transition: all 0.2s;
        }
        .player-card.active {
            border-color: #FF4500;
            background-color: #FFFCEB;
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(255, 69, 0, 0.15);
        }
        .player-card.active::after {
            content: '⭐ 輪到你';
            position: absolute;
            top: -12px;
            right: 12px;
            background: #FF4500;
            color: white;
            font-size: 0.8rem;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        .player-title {
            font-size: 1.15rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--text-dark);
        }
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.15);
        }
        .score-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 10px;
        }
        .obstacle-btn {
            width: 100%;
            font-size: 0.95rem;
            padding: 8px;
            background-color: #E6D5C3;
            border: 2px solid #8B5A2B;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-dark);
        }
        .obstacle-btn:disabled {
            background-color: #EAEAEA;
            color: #A0A0A0;
            border-color: #CCC;
            cursor: not-allowed;
        }
        .obstacle-status {
            font-size: 0.9rem;
            background: #F3F3F3;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            color: #777;
            border: 1px solid #DDD;
        }

        /* 棋盤完美對齊配置 */
        .board-wrapper {
            flex: 2;
            min-width: 320px;
            max-width: 480px;
            background: #FCEFCE;
            border: 6px solid #CD853F;
            border-radius: 24px;
            padding: 10px;
            box-shadow: inset 0 0 20px rgba(139,69,19,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-board {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
        }
        .status-bar {
            width: 100%;
            background: var(--text-dark);
            color: #FFF8DC;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* SVG 棋盤樣式定義 */
        .board-line {
            stroke: #8B5A2B;
            stroke-width: 5;
            stroke-linecap: round;
        }
        .board-node-bg {
            fill: #FFFDF4;
            stroke: #CD853F;
            stroke-width: 3;
            cursor: pointer;
            transition: fill 0.2s;
        }
        .board-node-bg:hover {
            fill: #FFEAA7;
        }
        /* 移動高亮：綠色閃爍 */
        .board-node-bg.highlight-move {
            fill: #A2FF86;
            stroke: #1A5F1A;
            stroke-width: 4;
            animation: pulse 1.4s infinite;
        }
        /* 障礙高亮：粉色 */
        .board-node-bg.highlight-obstacle {
            fill: #FFB3D1;
            stroke: #D01C6A;
            stroke-width: 3;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        .coin-group {
            cursor: pointer;
        }
        .coin-group.selected circle {
            stroke: #FF3333 !important;
            stroke-width: 5px !important;
            filter: drop-shadow(0px 0px 5px rgba(255,0,0,0.6));
        }

        /* 結算大畫面 */
        #victory-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .victory-content {
            background: #FFFDF4;
            border: 8px solid #FFD700;
            border-radius: 30px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .winner-title {
            font-size: 2.3rem;
            color: #FF4500;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .rank-list {
            text-align: left;
            margin: 20px auto;
            max-width: 280px;
            font-size: 1.25rem;
            line-height: 2.2;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="page-title" class="page active">
        <h1>吃金幣遊戲 🪙</h1>
        <div class="subtitle">國小互動益智網頁版</div>
        
        <div class="menu-box">
            <div class="option-group">
                <label for="player-count">選擇遊玩人數：</label>
                <select id="player-count">
                    <option value="2">2 人遊戲 (金、銅)</option>
                    <option value="3">3 人遊戲 (金、銅、銀)</option>
                    <option value="4">4 人遊戲 (金、銅、銀、綠)</option>
                </select>
            </div>
            <div class="option-group">
                <label for="game-mode">選擇對戰模式：</label>
                <select id="game-mode">
                    <option value="ai">單人跟電腦 PK (其餘為電腦)</option>
                    <option value="local">多人同螢幕對戰 (大家輪流玩)</option>
                </select>
            </div>
        </div>
        
        <button class="btn" onclick="goToRulesPage()">下一步：查看遊戲規則 ➡️</button>
    </div>

    <div id="page-rules" class="page">
        <h1>📜 遊戲玩法</h1>
        <div class="subtitle">超簡單 4 步驟，看完馬上開戰！</div>
        
        <div class="rules-list-container">
            <div class="rule-item-box">
                <div class="rule-num">1</div>
                <div class="rule-text">輪到你時，選自己的金幣，<strong>沿著黑線「跳過」</strong>相鄰的硬幣落到空格。</div>
            </div>
            <div class="rule-item-box">
                <div class="rule-num">2</div>
                <div class="rule-text">被你跳過去的那枚硬幣會被吃掉，<strong>每吃一枚就得 1 分</strong>！</div>
            </div>
            <div class="rule-item-box">
                <div class="rule-num">3</div>
                <div class="rule-text">每人有一次機會改放<strong>「守護獸」擋住格子</strong>封鎖對手（放怪獸的回合不能移動金幣）。</div>
            </div>
            <div class="rule-item-box">
                <div class="rule-num">4</div>
                <div class="rule-text">當全場金幣都<strong>沒路可跳時</strong>遊戲結束，累計<strong>分數最高的人獲勝</strong>！</div>
            </div>
        </div>
        
        <div style="margin-top: 25px;">
            <button class="btn" onclick="goToTitlePage()" style="background-color: #CD5C5C; box-shadow: 0 6px 0px #8B2525;">⬅️ 返回首頁</button>
            <button class="btn" onclick="startActualGame()" style="background-color: #2E8B57; box-shadow: 0 6px 0px #1E5D3A;">正式開啟遊戲大戰！ ⚔️</button>
        </div>
    </div>

    <div id="page-game" class="page">
        <div class="status-bar" id="game-status">準備進入戰場...</div>

        <div class="game-layout">
            <div class="side-panel" id="left-panel"></div>

            <div class="board-wrapper">
                <svg id="game-board" viewBox="0 0 500 500">
                    </svg>
            </div>

            <div class="side-panel" id="right-panel"></div>
        </div>

        <div style="margin-top: 25px;">
            <button class="btn" onclick="showRulesPopupFromGame()" style="background-color: #DEB887; color: #4A3319; box-shadow: 0 6px 0px #8B5A2B;">💡 再次查看規則</button>
            <button class="btn" onclick="backToMenuFromGame()" style="background-color: #CD5C5C; box-shadow: 0 6px 0px #8B2525;">🏳️ 放棄並回主選單</button>
        </div>
    </div>
</div>

<div id="victory-screen">
    <div class="victory-content">
        <div class="winner-title" id="winner-text">👑 恭喜獲勝！</div>
        <div class="rank-list" id="rank-list"></div>
        <button class="btn" onclick="backToMenuFromGame()">再玩一局 🪙</button>
    </div>
</div>

<script>
    // ================= 瀏覽器免外部檔案 Web Audio 音效引擎 =================
    const SoundEngine = {
        ctx: null,
        init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
        },
        playSelect() {
            this.init();
            let osc = this.ctx.createOscillator();
            let gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(550, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(750, this.ctx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.08);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.08);
        },
        playMoveEat() {
            this.init();
            let t = this.ctx.currentTime;
            [1046.50, 1318.51].forEach((freq, idx) => {
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t + idx * 0.06);
                gain.gain.setValueAtTime(0.15, t + idx * 0.06);
                gain.gain.linearRampToValueAtTime(0, t + idx * 0.06 + 0.18);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(t + idx * 0.06); osc.stop(t + idx * 0.06 + 0.18);
            });
        },
        playObstacle() {
            this.init();
            let osc = this.ctx.createOscillator();
            let gain = this.ctx.createGain();
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(160, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.2);
        },
        playVictory() {
            this.init();
            let t = this.ctx.currentTime;
            let notes = [523.25, 659.25, 783.99, 1046.50]; 
            notes.forEach((freq, idx) => {
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t + idx * 0.1);
                gain.gain.setValueAtTime(0.15, t + idx * 0.1);
                gain.gain.linearRampToValueAtTime(0, t + idx * 0.1 + 0.35);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(t + idx * 0.1); osc.stop(t + idx * 0.1 + 0.35);
            });
        }
    };

    // ================= 遊戲核心組態設定 =================
    const GRID_SIZE = 5; 
    const BOARD_CENTER = 250;
    const NODE_SPACING = 52; 

    const PLAYER_CONFIGS = [
        { id: 0, name: "金色玩家", color: "#FFD700", stroke: "#B8860B", monster: "🐍 蛇髮妖" },
        { id: 1, name: "古銅玩家", color: "#E25822", stroke: "#8B0000", monster: "👁️ 獨眼巨" },
        { id: 2, name: "古銀玩家", color: "#9370DB", stroke: "#4B0082", monster: "🧻 木乃伊" },
        { id: 3, name: "古金玩家", color: "#2E8B57", stroke: "#004D26", monster: "🐙 深海章" }
    ];

    let playerCount = 2;
    let gameMode = 'ai';
    let currentPlayerIndex = 0;
    let board = []; 
    let scores = [0, 0, 0, 0];
    let obstacleUsed = [false, false, false, false];
    let selectedNode = null; 
    let isPlacingObstacle = false;
    let isGameOver = false;

    // ================= 狀態與頁面切換機制 =================
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function goToTitlePage() {
        SoundEngine.playSelect();
        switchPage('page-title');
    }

    function goToRulesPage() {
        SoundEngine.init(); 
        SoundEngine.playSelect();
        switchPage('page-rules');
    }

    function showRulesPopupFromGame() {
        SoundEngine.playSelect();
        alert("💡 快速規則備忘：\n1. 點擊自色金幣，沿線跳過旁邊任何硬幣落到空格就能吃幣得分。\n2. 每人可召喚一次守護獸阻擋格子，這回合不能走棋。");
    }

    function backToMenuFromGame() {
        SoundEngine.playSelect();
        document.getElementById('victory-screen').style.display = 'none';
        isGameOver = false;
        switchPage('page-title');
    }

    // ================= 棋盤對齊公式運算 =================
    function getXY(r, c) {
        const x = BOARD_CENTER + (c - r) * NODE_SPACING;
        const y = BOARD_CENTER + (c + r - (GRID_SIZE - 1)) * NODE_SPACING;
        return { x, y };
    }

    function startActualGame() {
        SoundEngine.playMoveEat();
        playerCount = parseInt(document.getElementById('player-count').value);
        gameMode = document.getElementById('game-mode').value;
        
        switchPage('page-game');

        initGameData();
        renderScoreboards();
        buildBoardSVG();
        updateStatusBar();
    }

    function initGameData() {
        currentPlayerIndex = 0;
        scores = [0, 0, 0, 0];
        obstacleUsed = [false, false, false, false];
        selectedNode = null;
        isPlacingObstacle = false;
        isGameOver = false;

        let coinPool = [];
        for (let i = 0; i < 24; i++) {
            coinPool.push(i % playerCount); 
        }
        for (let i = coinPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [coinPool[i], coinPool[j]] = [coinPool[j], coinPool[i]];
        }

        board = [];
        let poolIndex = 0;
        for (let r = 0; r < GRID_SIZE; r++) {
            board[r] = [];
            for (let c = 0; c < GRID_SIZE; c++) {
                if (r === 2 && c === 2) {
                    board[r][c] = null; 
                } else {
                    board[r][c] = { type: 'coin', color: coinPool[poolIndex++] };
                }
            }
        }
    }

    // ================= 網格 SVG 繪製 =================
    function buildBoardSVG() {
        const svg = document.getElementById('game-board');
        svg.innerHTML = ''; 

        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const current = getXY(r, c);
                if (c + 1 < GRID_SIZE) {
                    const right = getXY(r, c + 1);
                    drawLine(svg, current.x, current.y, right.x, right.y);
                }
                if (r + 1 < GRID_SIZE) {
                    const down = getXY(r + 1, c);
                    drawLine(svg, current.x, current.y, down.x, down.y);
                }
            }
        }

        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const pos = getXY(r, c);
                const nodeBg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                nodeBg.setAttribute("cx", pos.x);
                nodeBg.setAttribute("cy", pos.y);
                nodeBg.setAttribute("r", 20); 
                nodeBg.setAttribute("class", "board-node-bg");
                nodeBg.setAttribute("id", `node-bg-${r}-${c}`);
                nodeBg.onclick = () => handleNodeClick(r, c);
                svg.appendChild(nodeBg);
            }
        }

        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const item = board[r][c];
                if (!item) continue;

                const pos = getXY(r, c);

                if (item.type === 'coin') {
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    g.setAttribute("class", "coin-group");
                    g.setAttribute("id", `coin-${r}-${c}`);
                    if (selectedNode && selectedNode.r === r && selectedNode.c === c) {
                        g.classList.add('selected');
                    }

                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", pos.x);
                    circle.setAttribute("cy", pos.y);
                    circle.setAttribute("r", 15);
                    circle.setAttribute("fill", PLAYER_CONFIGS[item.color].color);
                    circle.setAttribute("stroke", PLAYER_CONFIGS[item.color].stroke);
                    circle.setAttribute("stroke-width", "2");

                    const innerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    innerCircle.setAttribute("cx", pos.x);
                    innerCircle.setAttribute("cy", pos.y);
                    innerCircle.setAttribute("r", 9);
                    innerCircle.setAttribute("fill", "none");
                    innerCircle.setAttribute("stroke", PLAYER_CONFIGS[item.color].stroke);
                    innerCircle.setAttribute("stroke-width", "1");
                    innerCircle.setAttribute("stroke-dasharray", "3,2");

                    g.appendChild(circle);
                    g.appendChild(innerCircle);

                    g.onclick = (e) => {
                        e.stopPropagation(); 
                        handleCoinClick(r, c);
                    };
                    svg.appendChild(g);

                } else if (item.type === 'obstacle') {
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", pos.x);
                    text.setAttribute("y", pos.y + 7);
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("font-size", "20");
                    text.style.cursor = "not-allowed";
                    text.textContent = PLAYER_CONFIGS[item.owner].monster.split(' ')[0];
                    svg.appendChild(text);
                }
            }
        }

        if (selectedNode && !isPlacingObstacle) {
            const validMoves = getValidMovesForNode(selectedNode.r, selectedNode.c);
            validMoves.forEach(m => {
                const el = document.getElementById(`node-bg-${m.targetR}-${m.targetC}`);
                if (el) el.classList.add('highlight-move');
            });
        }

        if (isPlacingObstacle) {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (!board[r][c]) {
                        const el = document.getElementById(`node-bg-${r}-${c}`);
                        if (el) el.classList.add('highlight-obstacle');
                    }
                }
            }
        }
    }

    function drawLine(svg, x1, y1, x2, y2) {
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1); line.setAttribute("y1", y1);
        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
        line.setAttribute("class", "board-line");
        svg.appendChild(line);
    }

    // ================= 互動控制常規控制處理 =================
    function handleCoinClick(r, c) {
        if (isGameOver || isPlacingObstacle) return;
        if (gameMode === 'ai' && currentPlayerIndex > 0) return; 

        const item = board[r][c];
        if (item && item.type === 'coin' && item.color === currentPlayerIndex) {
            SoundEngine.playSelect();
            if (selectedNode && selectedNode.r === r && selectedNode.c === c) {
                selectedNode = null;
            } else {
                selectedNode = { r, c };
            }
            buildBoardSVG();
        }
    }

    function handleNodeClick(r, c) {
        if (isGameOver) return;
        if (gameMode === 'ai' && currentPlayerIndex > 0) return;

        if (isPlacingObstacle) {
            if (!board[r][c]) { 
                SoundEngine.playObstacle();
                board[r][c] = { type: 'obstacle', owner: currentPlayerIndex };
                obstacleUsed[currentPlayerIndex] = true;
                isPlacingObstacle = false;
                endTurn();
            }
            return;
        }

        if (selectedNode) {
            const validMoves = getValidMovesForNode(selectedNode.r, selectedNode.c);
            const move = validMoves.find(m => m.targetR === r && m.targetC === c);
            if (move) {
                SoundEngine.playMoveEat();
                executeMove(selectedNode.r, selectedNode.c, move.middleR, move.middleC, r, c);
            } else {
                selectedNode = null;
                buildBoardSVG();
            }
        }
    }

    function startObstaclePlacement() {
        SoundEngine.playSelect();
        isPlacingObstacle = true;
        selectedNode = null;
        buildBoardSVG();
        updateStatusBar();
    }

    function getValidMovesForNode(r, c) {
        const moves = [];
        const item = board[r][c];
        if (!item || item.type !== 'coin') return moves;

        const directions = [
            { dr: -2, dc: 0 }, { dr: 2, dc: 0 }, { dr: 0, dc: -2 }, { dr: 0, dc: 2 }
        ];

        directions.forEach(d => {
            const targetR = r + d.dr;
            const targetC = c + d.dc;
            const middleR = r + d.dr / 2;
            const middleC = c + d.dc / 2;

            if (targetR >= 0 && targetR < GRID_SIZE && targetC >= 0 && targetC < GRID_SIZE) {
                const targetCell = board[targetR][targetC];
                const middleCell = board[middleR][middleC];

                if (!targetCell && middleCell && middleCell.type === 'coin') {
                    moves.push({ targetR, targetC, middleR, middleC });
                }
            }
        });
        return moves;
    }

    function executeMove(fromR, fromC, midR, midC, toR, toC) {
        board[toR][toC] = board[fromR][fromC];
        board[fromR][fromC] = null;
        board[midR][midC] = null; 
        scores[currentPlayerIndex]++;
        endTurn();
    }

    function hasAnyValidMoves(playerIdx) {
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const item = board[r][c];
                if (item && item.type === 'coin' && item.color === playerIdx) {
                    if (getValidMovesForNode(r, c).length > 0) return true;
                }
            }
        }
        return false;
    }

    function checkGlobalGameOver() {
        for (let i = 0; i < playerCount; i++) {
            if (hasAnyValidMoves(i)) return false;
        }
        return true;
    }

    function endTurn() {
        if (checkGlobalGameOver()) {
            handleGameOver();
            return;
        }

        let nextPlayer = currentPlayerIndex;
        let loopCount = 0;
        while (loopCount < playerCount) {
            nextPlayer = (nextPlayer + 1) % playerCount;
            if (hasAnyValidMoves(nextPlayer) || !obstacleUsed[nextPlayer]) {
                currentPlayerIndex = nextPlayer;
                break;
            }
            loopCount++;
        }

        selectedNode = null;
        isPlacingObstacle = false;
        renderScoreboards();
        buildBoardSVG();
        updateStatusBar();

        if (gameMode === 'ai' && currentPlayerIndex > 0 && !isGameOver) {
            setTimeout(executeAIMove, 700);
        }
    }

    // ================= 電腦 AI 決策邏輯 =================
    function executeAIMove() {
        if (isGameOver) return;

        let allPossibleMoves = [];
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const item = board[r][c];
                if (item && item.type === 'coin' && item.color === currentPlayerIndex) {
                    const validMoves = getValidMovesForNode(r, c);
                    validMoves.forEach(m => {
                        allPossibleMoves.push({ fromR: r, fromC: c, ...m });
                    });
                }
            }
        }

        if (allPossibleMoves.length > 0) {
            SoundEngine.playMoveEat();
            const randomMove = allPossibleMoves[Math.floor(Math.random() * allPossibleMoves.length)];
            executeMove(randomMove.fromR, randomMove.fromC, randomMove.middleR, randomMove.middleC, randomMove.targetR, randomMove.targetC);
            return;
        }

        if (!obstacleUsed[currentPlayerIndex]) {
            let emptyCells = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (!board[r][c]) emptyCells.push({ r, c });
                }
            }
            if (emptyCells.length > 0) {
                SoundEngine.playObstacle();
                let bestCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[bestCell.r][bestCell.c] = { type: 'obstacle', owner: currentPlayerIndex };
                obstacleUsed[currentPlayerIndex] = true;
                endTurn();
                return;
            }
        }
        endTurn();
    }

    // ================= 資訊看板更新與結算 =================
    function renderScoreboards() {
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        leftPanel.innerHTML = ''; rightPanel.innerHTML = '';

        for (let i = 0; i < playerCount; i++) {
            const conf = PLAYER_CONFIGS[i];
            const isAI = (gameMode === 'ai' && i > 0);
            
            const card = document.createElement('div');
            card.className = `player-card ${i === currentPlayerIndex ? 'active' : ''}`;

            const title = document.createElement('div');
            title.className = 'player-title';
            title.innerHTML = `<span class="color-dot" style="background-color: ${conf.color};"></span> ${conf.name} ${isAI ? '(電腦)' : ''}`;
            
            const score = document.createElement('div');
            score.className = 'score-display';
            score.textContent = `${scores[i]} 分`;

            card.appendChild(title);
            card.appendChild(score);

            if (!obstacleUsed[i]) {
                if (isAI) {
                    const statusText = document.createElement('div');
                    statusText.className = 'obstacle-status';
                    statusText.textContent = `⚡ 守護獸待命中`;
                    card.appendChild(statusText);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'obstacle-btn';
                    btn.textContent = `召喚 ${conf.monster.split(' ')[1]}`;
                    btn.disabled = (i !== currentPlayerIndex || isPlacingObstacle);
                    btn.onclick = () => startObstaclePlacement();
                    card.appendChild(btn);
                }
            } else {
                const statusText = document.createElement('div');
                statusText.className = 'obstacle-status';
                statusText.style.textDecoration = 'line-through';
                statusText.textContent = `❌ 已召喚${conf.monster.split(' ')[1]}`;
                card.appendChild(statusText);
            }

            if (i % 2 === 0) leftPanel.appendChild(card);
            else rightPanel.appendChild(card);
        }
    }

    function updateStatusBar() {
        const bar = document.getElementById('game-status');
        if (isGameOver) return;

        const currentConf = PLAYER_CONFIGS[currentPlayerIndex];
        const isAI = (gameMode === 'ai' && currentPlayerIndex > 0);
        
        if (isPlacingObstacle) {
            bar.textContent = `🎯 請點選棋盤任意【粉色空格】召喚守護獸防禦！`;
            bar.style.backgroundColor = '#D01C6A';
        } else if (isAI) {
            bar.textContent = `🤖 電腦小朋友 (${currentConf.name}) 正在思考怎麼跳...`;
            bar.style.backgroundColor = '#5A6B7C';
        } else {
            bar.textContent = `👉 輪到【${currentConf.name}】了！請選金幣沿黑線跳躍吃幣！`;
            bar.style.backgroundColor = 'var(--text-dark)';
        }
    }

    function handleGameOver() {
        isGameOver = true;
        SoundEngine.playVictory();
        
        let ranks = [];
        for (let i = 0; i < playerCount; i++) {
            ranks.push({ name: PLAYER_CONFIGS[i].name, score: scores[i] });
        }
        ranks.sort((a, b) => b.score - a.score);

        const winnerText = document.getElementById('winner-text');
        if (ranks[0].score === ranks[1]?.score) {
            winnerText.textContent = `🤝 大家平分秋色，平手！`;
        } else {
            winnerText.textContent = `👑 恭喜 ${ranks[0].name} 贏了！`;
        }

        const rankListEl = document.getElementById('rank-list');
        rankListEl.innerHTML = '';
        ranks.forEach((r, idx) => {
            const div = document.createElement('div');
            div.innerHTML = `<strong>第 ${idx + 1} 名：</strong> ${r.name} (${r.score} 分)`;
            rankListEl.appendChild(div);
        });

        document.getElementById('victory-screen').style.display = 'flex';
    }
</script>
