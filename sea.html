<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海戰棋</title>
  <!-- 直接透過 CDN 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">
  
  <div id="app"></div>

  <script>
    // --- 遊戲圖示 (SVG) ---
    const ICONS = {
      Ship: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1 .6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.76"/><path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/><path d="M12 10v4"/><path d="M12 2v3"/></svg>`,
      Droplets: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.99 7 2.99s-2.29 6.07-3.29 7.07C2.57 11.01 2 12.11 2 13.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 1 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></svg>`,
      Eraser: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>`,
      Info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
      CheckCircle2: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
      Home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>`,
      RefreshCw: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>`,
      Volume2: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`,
      VolumeX: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`,
      ArrowRight: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>`
    };

    // --- 偽隨機數生成器 (PRNG) ---
    // 確保同一關卡的同一題號，永遠產生一模一樣的盤面與提示點
    const xmur3 = (str) => {
        for(let i = 0, h = 1779033703 ^ str.length; i < str.length; i++) {
            h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
            h = h << 13 | h >>> 19;
        } return function() {
            h = Math.imul(h ^ (h >>> 16), 2246822507);
            h = Math.imul(h ^ (h >>> 13), 3266489909);
            return (h ^= h >>> 16) >>> 0;
        }
    };
    const mulberry32 = (a) => {
        return function() {
          let t = a += 0x6D2B79F5;
          t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61);
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    };

    // --- 遊戲常數與狀態 ---
    const LEVELS = {
      PRACTICE: { rows: 2, cols: 4, fleet: [2, 1], name: "練習 (4x2)", hints: 1, totalPuzzles: 5, next: 'BEGINNER' },
      BEGINNER: { rows: 4, cols: 4, fleet: [2, 1, 1], name: "入門 (4x4)", hints: 2, totalPuzzles: 7, next: 'EASY' },
      EASY: { rows: 5, cols: 5, fleet: [3, 2, 1, 1], name: "簡單 (5x5)", hints: 3, totalPuzzles: 7, next: 'MEDIUM' },
      MEDIUM: { rows: 6, cols: 6, fleet: [3, 2, 2, 1, 1, 1], name: "中等 (6x6)", hints: 4, totalPuzzles: 7, next: 'HARD' },
      HARD: { rows: 8, cols: 8, fleet: [4, 3, 2, 2, 1, 1, 1, 1], name: "困難 (8x8)", hints: 5, totalPuzzles: 5, next: null }
    };
    
    const EMPTY = 0, WATER = 1, SHIP = 2;

    let state = {
      appState: 'MENU',
      difficultyKey: 'BEGINNER',
      puzzleNum: 1,
      puzzle: { solution: [], rowClues: [], colClues: [] },
      userGrid: [],
      initialUserGrid: [], // 用於清除盤面功能
      lockedCells: [],
      tool: SHIP,
      isWon: false,
      soundEnabled: true
    };

    // --- 音效合成器 ---
    const playSound = (type) => {
      if (!state.soundEnabled) return;
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'ship') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(200, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'water') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'erase') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(300, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.start(); osc.stop(ctx.currentTime + 0.05);
        } else if (type === 'win') {
          const freqs = [440, 554, 659, 880];
          freqs.forEach((f, i) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'sine'; o.frequency.value = f;
            o.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
            g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i * 0.1 + 0.05);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.1 + 0.3);
            o.start(ctx.currentTime + i * 0.1); o.stop(ctx.currentTime + i * 0.1 + 0.3);
          });
        }
      } catch (e) {
        console.error("Audio error", e);
      }
    };

    // --- 遊戲邏輯 ---
    const generatePuzzle = (rows, cols, fleetReq, random) => {
      let valid = false;
      let grid = [];
      let rowClues = [], colClues = [];

      while (!valid) {
        grid = Array(rows).fill(0).map(() => Array(cols).fill(EMPTY));
        valid = true;

        for (let len of fleetReq) {
          let placed = false;
          let attempts = 0;
          
          while (!placed && attempts < 300) {
            attempts++;
            const isHoriz = random() > 0.5;
            const r = Math.floor(random() * (isHoriz ? rows : rows - len + 1));
            const c = Math.floor(random() * (isHoriz ? cols - len + 1 : cols));

            let canPlace = true;
            for (let i = 0; i < len; i++) {
              const rr = isHoriz ? r : r + i;
              const cc = isHoriz ? c + i : c;
              
              for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                  const nr = rr + dr; const nc = cc + dc;
                  if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                    if (grid[nr][nc] === SHIP) canPlace = false;
                  }
                }
              }
            }

            if (canPlace) {
              for (let i = 0; i < len; i++) grid[isHoriz ? r : r + i][isHoriz ? c + i : c] = SHIP;
              placed = true;
            }
          }
          if (!placed) { valid = false; break; }
        }

        if (valid) {
          rowClues = grid.map(row => row.filter(cell => cell === SHIP).length);
          colClues = [];
          for (let c = 0; c < cols; c++) {
            let sum = 0;
            for (let r = 0; r < rows; r++) if (grid[r][c] === SHIP) sum++;
            colClues.push(sum);
          }
        }
      }
      return { solution: grid, rowClues, colClues };
    };

    const startNewGame = (levelKey = state.difficultyKey, puzzleNum = 1) => {
      const level = LEVELS[levelKey];
      state.difficultyKey = levelKey;
      state.puzzleNum = puzzleNum;
      
      // 使用「難度 + 題號」產生固定的亂數種子
      const seedStr = levelKey + "_puzzle_" + puzzleNum;
      const seed = xmur3(seedStr)();
      const random = mulberry32(seed);

      const newPuzzle = generatePuzzle(level.rows, level.cols, level.fleet, random);
      
      const initialGrid = Array(level.rows).fill(0).map(() => Array(level.cols).fill(EMPTY));
      const newLocked = Array(level.rows).fill(0).map(() => Array(level.cols).fill(false));
      
      let hintsGiven = 0;
      while (hintsGiven < level.hints) {
        const r = Math.floor(random() * level.rows);
        const c = Math.floor(random() * level.cols);
        if (!newLocked[r][c]) {
          initialGrid[r][c] = newPuzzle.solution[r][c] === SHIP ? SHIP : WATER;
          newLocked[r][c] = true;
          hintsGiven++;
        }
      }

      state.puzzle = newPuzzle;
      state.userGrid = initialGrid;
      // 備份初始盤面，供清除重來使用
      state.initialUserGrid = JSON.parse(JSON.stringify(initialGrid));
      state.lockedCells = newLocked;
      state.isWon = false;
      state.tool = SHIP; // 每次換題預設為船隻工具
      state.appState = 'PLAYING';
      render();
    };

    const resetCurrentPuzzle = () => {
      state.userGrid = JSON.parse(JSON.stringify(state.initialUserGrid));
      state.isWon = false;
      playSound('erase');
      render();
    };

    const checkWinCondition = () => {
      const rows = LEVELS[state.difficultyKey].rows;
      const cols = LEVELS[state.difficultyKey].cols;
      const fleet = LEVELS[state.difficultyKey].fleet;
      const grid = state.userGrid;

      // 檢查行列提示
      for (let r = 0; r < rows; r++) {
        if (grid[r].filter(cell => cell === SHIP).length !== state.puzzle.rowClues[r]) return;
      }
      for (let c = 0; c < cols; c++) {
        let sum = 0;
        for (let r = 0; r < rows; r++) if (grid[r][c] === SHIP) sum++;
        if (sum !== state.puzzle.colClues[c]) return;
      }

      // 檢查船隻配置是否正確(無對角相鄰)
      const visited = Array(rows).fill(0).map(() => Array(cols).fill(false));
      const foundShips = [];

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] === SHIP && !visited[r][c]) {
            const shipCells = [];
            const q = [[r, c]];
            visited[r][c] = true;

            while (q.length > 0) {
              const [currR, currC] = q.shift();
              shipCells.push([currR, currC]);

              for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                  if (dr === 0 && dc === 0) continue;
                  const nr = currR + dr; const nc = currC + dc;
                  
                  if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === SHIP) {
                    if (Math.abs(dr) === 1 && Math.abs(dc) === 1) return; // 對角線相連失敗
                    if (!visited[nr][nc]) {
                      visited[nr][nc] = true;
                      q.push([nr, nc]);
                    }
                  }
                }
              }
            }

            const isHoriz = shipCells.every(cell => cell[0] === shipCells[0][0]);
            const isVert = shipCells.every(cell => cell[1] === shipCells[0][1]);
            if (!isHoriz && !isVert) return;

            foundShips.push(shipCells.length);
          }
        }
      }

      const sortedFound = foundShips.sort((a, b) => b - a);
      if (sortedFound.length !== fleet.length) return;
      for (let i = 0; i < fleet.length; i++) {
        if (sortedFound[i] !== fleet[i]) return;
      }

      state.isWon = true;
      playSound('win');
      render();
    };

    // --- UI 渲染與互動 ---
    const getCellClassName = (r, c) => {
      const cellState = state.userGrid[r][c];
      const isLocked = state.lockedCells[r][c];
      let base = "w-full h-full flex items-center justify-center transition-all duration-200 select-none ";
      
      if (cellState === EMPTY) return base + (isLocked ? "bg-gray-100" : "bg-slate-50 hover:bg-blue-50 cursor-pointer");
      if (cellState === WATER) return base + "bg-blue-100 text-blue-400 " + (isLocked ? "opacity-80" : "cursor-pointer hover:bg-blue-200");
      
      if (cellState === SHIP) {
        const rows = LEVELS[state.difficultyKey].rows;
        const cols = LEVELS[state.difficultyKey].cols;
        const hasTop = r > 0 && state.userGrid[r - 1][c] === SHIP;
        const hasBottom = r < rows - 1 && state.userGrid[r + 1][c] === SHIP;
        const hasLeft = c > 0 && state.userGrid[r][c - 1] === SHIP;
        const hasRight = c < cols - 1 && state.userGrid[r][c + 1] === SHIP;

        let shapeClass = "bg-slate-700 text-slate-700 ";
        if (!hasTop && !hasBottom && !hasLeft && !hasRight) shapeClass += "rounded-full scale-75";
        else if (hasTop && hasBottom) shapeClass += "rounded-none scale-y-100 scale-x-75";
        else if (hasLeft && hasRight) shapeClass += "rounded-none scale-x-100 scale-y-75";
        else if (hasRight && !hasLeft && !hasTop && !hasBottom) shapeClass += "rounded-l-full scale-y-75 origin-right";
        else if (hasLeft && !hasRight && !hasTop && !hasBottom) shapeClass += "rounded-r-full scale-y-75 origin-left";
        else if (hasBottom && !hasTop && !hasLeft && !hasRight) shapeClass += "rounded-t-full scale-x-75 origin-bottom";
        else if (hasTop && !hasBottom && !hasLeft && !hasRight) shapeClass += "rounded-b-full scale-x-75 origin-top";
        else shapeClass += "rounded-none scale-75"; 

        return base + shapeClass + (isLocked ? " opacity-90" : " cursor-pointer hover:bg-slate-600");
      }
    };

    const getRowCount = (r) => state.userGrid[r]?.filter(cell => cell === SHIP).length || 0;
    const getColCount = (c) => {
      let sum = 0;
      for (let r = 0; r < LEVELS[state.difficultyKey].rows; r++) if (state.userGrid[r]?.[c] === SHIP) sum++;
      return sum;
    };

    const renderFleetHints = () => {
      const fleetGroups = {};
      LEVELS[state.difficultyKey].fleet.forEach(f => {
        fleetGroups[f] = (fleetGroups[f] || 0) + 1;
      });

      return Object.entries(fleetGroups).sort((a,b) => b[0] - a[0]).map(([size, count]) => `
        <div class="flex items-center gap-2 bg-slate-50 px-3 py-2 rounded-lg border border-slate-200">
          <span class="text-sm font-bold text-slate-600">${size}格船</span>
          <span class="text-xs text-slate-400 mr-1">x ${count}</span>
          <div class="flex gap-[1px] bg-slate-700 p-[1px] rounded-full">
            ${Array(Number(size)).fill(0).map(() => `<div class="w-4 h-4 sm:w-5 sm:h-5 bg-slate-700 ${size === '1' ? 'rounded-full' : ''}"></div>`).join('')}
          </div>
        </div>
      `).join('');
    };

    const renderMenuHTML = () => `
      <div class="flex items-center justify-center p-4 min-h-screen">
        <div class="max-w-xl w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200 relative">
          
          <button data-action="toggle-sound" class="absolute top-4 right-4 p-2 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition">
            <div class="w-6 h-6">${state.soundEnabled ? ICONS.Volume2 : ICONS.VolumeX}</div>
          </button>

          <div class="flex flex-col items-center mb-6">
            <div class="w-16 h-16 text-blue-600 mb-4">${ICONS.Ship}</div>
            <h1 class="text-4xl font-bold text-slate-800 mb-2">海戰棋</h1>
            <p class="text-slate-500 font-medium">挑戰你的邏輯推理！</p>
          </div>

          <div class="bg-slate-50 p-6 rounded-xl border border-slate-200 mb-6 text-slate-700 leading-relaxed">
            <h3 class="font-bold text-xl mb-4 flex items-center gap-2">
              <div class="text-blue-500 w-6 h-6">${ICONS.Info}</div> 遊戲規則
            </h3>
            <ul class="space-y-3 list-none">
              <li class="flex gap-3"><span class="text-blue-500 font-bold mt-1">•</span><span>依據提示數字找出隱藏的船。邊緣數字代表該直行或橫列的<strong>船格總數</strong>。</span></li>
              <li class="flex gap-3"><span class="text-blue-500 font-bold mt-1">•</span><span><strong>最重要規則：</strong>船跟船之間<strong>絕對不能碰在一起</strong> (連斜角都不行)！</span></li>
              <li class="flex gap-3"><span class="text-blue-500 font-bold mt-1">•</span><span>善用「標記水域」：確定沒有船的地方，畫上水滴💧，能幫你更快找出剩下的船！</span></li>
            </ul>
          </div>

          <div class="space-y-3">
            <h3 class="text-center font-bold text-slate-500 mb-2">請選擇難度 (題庫順序固定，可隨時接續)</h3>
            
            <button data-action="start" data-diff="PRACTICE" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md transform hover:-translate-y-1 text-lg flex justify-between items-center">
              <span>📝 練習 (共 5 題)</span><span class="text-sm font-normal bg-yellow-600 px-3 py-1 rounded-full">4x2</span>
            </button>
            <button data-action="start" data-diff="BEGINNER" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md transform hover:-translate-y-1 text-lg flex justify-between items-center">
              <span>👶 入門 (共 7 題)</span><span class="text-sm font-normal bg-teal-600 px-3 py-1 rounded-full">4x4</span>
            </button>
            <button data-action="start" data-diff="EASY" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md transform hover:-translate-y-1 text-lg flex justify-between items-center">
              <span>🌟 簡單 (共 7 題)</span><span class="text-sm font-normal bg-green-600 px-3 py-1 rounded-full">5x5</span>
            </button>
            <button data-action="start" data-diff="MEDIUM" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md transform hover:-translate-y-1 text-lg flex justify-between items-center">
              <span>⭐ 中等 (共 7 題)</span><span class="text-sm font-normal bg-blue-600 px-3 py-1 rounded-full">6x6</span>
            </button>
            <button data-action="start" data-diff="HARD" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md transform hover:-translate-y-1 text-lg flex justify-between items-center">
              <span>🔥 困難 (共 5 題)</span><span class="text-sm font-normal bg-purple-600 px-3 py-1 rounded-full">8x8</span>
            </button>
          </div>
        </div>
      </div>
    `;

    const renderPlayingHTML = () => {
      const level = LEVELS[state.difficultyKey];
      const isHard = level.cols >= 8;
      const sizeClassCols = isHard ? 'w-10 sm:w-12 h-10 sm:h-12 text-lg sm:text-xl' : 'w-12 sm:w-16 h-12 sm:h-16 text-xl sm:text-2xl';
      const sizeClassRows = isHard ? 'w-[34px] h-10 sm:h-12 text-lg sm:text-xl' : 'w-[46px] h-12 sm:h-16 text-xl sm:text-2xl';
      const cellSizeClass = isHard ? 'w-10 h-10 sm:w-12 sm:h-12' : 'w-12 h-12 sm:w-16 sm:h-16';
      const marginClass = isHard ? 'ml-[36px]' : 'ml-[48px]';
      const dropSize = isHard ? 'w-5 h-5' : 'w-7 h-7';

      return `
        <div class="py-6 px-4 flex flex-col items-center max-w-xl mx-auto">
          
          <!-- 頂部標題與按鈕 -->
          <div class="w-full flex justify-between items-center mb-4">
            <div>
              <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 flex items-center gap-2">
                <div class="w-6 h-6 sm:w-8 sm:h-8 text-blue-600">${ICONS.Ship}</div>
                ${level.name}
              </h1>
              <p class="text-blue-600 font-bold mt-1 bg-blue-50 inline-block px-3 py-1 rounded-full text-sm">
                目前進度：第 ${state.puzzleNum} / ${level.totalPuzzles} 題
              </p>
            </div>
            <div class="flex gap-2">
              <button data-action="toggle-sound" class="p-2 rounded-full bg-slate-200 hover:bg-slate-300 text-slate-600 transition" title="音效開關">
                <div class="w-5 h-5">${state.soundEnabled ? ICONS.Volume2 : ICONS.VolumeX}</div>
              </button>
              <button data-action="home" class="p-2 rounded-full bg-slate-200 hover:bg-slate-300 text-slate-600 transition" title="回首頁選難度">
                <div class="w-5 h-5">${ICONS.Home}</div>
              </button>
              <button data-action="reset" class="p-2 rounded-full bg-red-100 hover:bg-red-200 text-red-600 transition" title="清除盤面 (重新開始本題)">
                <div class="w-5 h-5">${ICONS.RefreshCw}</div>
              </button>
            </div>
          </div>

          <!-- 勝利訊息與過關按鈕 -->
          ${state.isWon ? `
            <div class="w-full bg-green-100 border border-green-300 text-green-800 p-4 rounded-xl mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 font-bold text-lg shadow-sm animate-[bounce_0.5s_ease-in-out]">
              <div class="flex items-center gap-2">
                <div class="w-7 h-7 text-green-600">${ICONS.CheckCircle2}</div>
                <span>太棒了！過關！</span>
              </div>
              <div class="flex gap-2">
                ${state.puzzleNum < level.totalPuzzles ? `
                  <button data-action="next-puzzle" class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-lg transition-transform hover:scale-105 flex items-center gap-1 shadow-md">
                    下一題 <div class="w-5 h-5">${ICONS.ArrowRight}</div>
                  </button>
                ` : `
                  ${level.next ? `
                    <button data-action="next-level" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg transition-transform hover:scale-105 flex items-center gap-1 shadow-md">
                      挑戰下一關 <div class="w-5 h-5">${ICONS.ArrowRight}</div>
                    </button>
                  ` : `
                    <button data-action="home" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg transition-transform hover:scale-105 shadow-md">回首頁</button>
                  `}
                `}
              </div>
            </div>
          ` : ''}

          <!-- 網格區域 -->
          <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-lg border border-slate-200 overflow-x-auto w-full flex justify-center mt-2">
            <div class="w-fit">
              
              <!-- 頂部列提示 -->
              <div class="flex mb-1 ${marginClass}">
                ${state.puzzle.colClues.map((clue, c) => {
                  const currentCount = getColCount(c);
                  const color = currentCount === clue ? 'text-slate-300' : currentCount > clue ? 'text-red-500' : 'text-slate-700';
                  return `<div class="${sizeClassCols} flex items-center justify-center font-bold transition-colors ${color}">${clue}</div>`;
                }).join('')}
              </div>

              <!-- 網格主體 -->
              <div class="flex flex-col gap-[2px] bg-slate-300 border-2 border-slate-400 p-[2px] rounded-lg">
                ${state.userGrid.map((row, r) => {
                  const clue = state.puzzle.rowClues[r];
                  const currentCount = getRowCount(r);
                  const color = currentCount === clue ? 'text-slate-300' : currentCount > clue ? 'text-red-500' : 'text-slate-700';
                  
                  return `
                    <div class="flex gap-[2px]">
                      <div class="${sizeClassRows} bg-white flex items-center justify-center font-bold mr-[2px] rounded-l">
                        <span class="${color} transition-colors">${clue}</span>
                      </div>
                      ${row.map((cell, c) => `
                        <div data-action="cell" data-r="${r}" data-c="${c}" class="${cellSizeClass} bg-white relative p-[2px] rounded-sm cursor-pointer hover:bg-slate-50">
                          <div class="${getCellClassName(r, c)}">
                            ${cell === WATER ? `<div class="${dropSize}">${ICONS.Droplets}</div>` : ''}
                          </div>
                          ${state.lockedCells[r][c] ? `<div class="absolute top-1 right-1 w-2 h-2 bg-black rounded-full opacity-20"></div>` : ''}
                        </div>
                      `).join('')}
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>

          <!-- 工具列 -->
          <div class="w-full mt-6 bg-white p-2 rounded-xl shadow-sm border border-slate-200 flex justify-center gap-2 sm:gap-4">
            <button data-action="tool" data-tool="${SHIP}" class="flex-1 flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 py-2 sm:py-3 px-1 sm:px-4 rounded-lg font-bold transition-all ${state.tool === SHIP ? 'bg-slate-700 text-white shadow-md transform scale-[1.02]' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}">
              <div class="w-5 h-5 rounded-sm flex items-center justify-center ${state.tool === SHIP ? 'bg-white text-slate-700' : 'bg-slate-400 text-slate-100'}">${ICONS.Ship}</div>
              <span class="text-xs sm:text-base">標記船隻</span>
            </button>
            <button data-action="tool" data-tool="${WATER}" class="flex-1 flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 py-2 sm:py-3 px-1 sm:px-4 rounded-lg font-bold transition-all ${state.tool === WATER ? 'bg-blue-500 text-white shadow-md transform scale-[1.02]' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}">
              <div class="w-6 h-6">${ICONS.Droplets}</div>
              <span class="text-xs sm:text-base">標記水域</span>
            </button>
            <button data-action="tool" data-tool="${EMPTY}" class="flex-1 flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 py-2 sm:py-3 px-1 sm:px-4 rounded-lg font-bold transition-all ${state.tool === EMPTY ? 'bg-red-500 text-white shadow-md transform scale-[1.02]' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}">
              <div class="w-5 h-5">${ICONS.Eraser}</div>
              <span class="text-xs sm:text-base">橡皮擦</span>
            </button>
          </div>

          <!-- 艦隊清單 -->
          <div class="w-full mt-6 text-center">
            <h4 class="text-sm font-bold text-slate-500 mb-3 uppercase tracking-wider">目標艦隊清單</h4>
            <div class="flex justify-center flex-wrap gap-4">
              ${renderFleetHints()}
            </div>
          </div>

        </div>
      `;
    };

    const render = () => {
      const app = document.getElementById('app');
      app.innerHTML = state.appState === 'MENU' ? renderMenuHTML() : renderPlayingHTML();
    };

    // --- 事件代理綁定 ---
    document.getElementById('app').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      
      const action = btn.dataset.action;

      if (action === 'toggle-sound') {
        state.soundEnabled = !state.soundEnabled;
        render();
      } else if (action === 'start') {
        startNewGame(btn.dataset.diff, 1);
      } else if (action === 'next-puzzle') {
        startNewGame(state.difficultyKey, state.puzzleNum + 1);
      } else if (action === 'next-level') {
        startNewGame(LEVELS[state.difficultyKey].next, 1);
      } else if (action === 'home') {
        state.appState = 'MENU';
        render();
      } else if (action === 'reset') {
        // 清除盤面 (僅清除玩家畫的，保留鎖定的提示)
        resetCurrentPuzzle();
      } else if (action === 'tool') {
        state.tool = parseInt(btn.dataset.tool);
        render();
      } else if (action === 'cell') {
        const r = parseInt(btn.dataset.r);
        const c = parseInt(btn.dataset.c);
        if (state.lockedCells[r][c] || state.isWon) return;

        // 如果目前選中橡皮擦
        if (state.tool === EMPTY) {
          if (state.userGrid[r][c] !== EMPTY) {
            state.userGrid[r][c] = EMPTY;
            playSound('erase');
          }
        } else {
          // 如果點擊已畫的同種工具，則清除 (如同橡皮擦效果)
          if (state.userGrid[r][c] === state.tool) {
            state.userGrid[r][c] = EMPTY;
            playSound('erase');
          } else {
            state.userGrid[r][c] = state.tool;
            playSound(state.tool === SHIP ? 'ship' : 'water');
          }
        }
        render(); // 立即更新畫面
        checkWinCondition(); // 檢查是否過關
      }
    });

    // 初始載入渲染首頁
    render();
  </script>
</body>
</html>
