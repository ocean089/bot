    let globalAudioContext = null;

    function App() {
      const [currentLevel, setCurrentLevel] = useState(0);
      const [initialBoard, setInitialBoard] = useState([]);
      const [board, setBoard] = useState([]);
      const [selectedCell, setSelectedCell] = useState(null);
      const [conflicts, setConflicts] = useState([]);
      const [showConflicts, setShowConflicts] = useState(false);
      const [isWon, setIsWon] = useState(false);
      const [soundEnabled, setSoundEnabled] = useState(true);

      const playAudio = useCallback((type) => {
        if (!soundEnabled) return;
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        
        if (!globalAudioContext) {
          globalAudioContext = new AudioContextClass();
        }
        const ctx = globalAudioContext;

        if (ctx.state === 'suspended') {
          ctx.resume();
        }
        
        const playOscillator = (freq, wave, duration, startTime = ctx.currentTime) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = wave;
          osc.frequency.setValueAtTime(freq, startTime);
          
          gain.gain.setValueAtTime(0, startTime);
          gain.gain.linearRampToValueAtTime(0.15, startTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
          
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(startTime);
          osc.stop(startTime + duration);
        };

        switch (type) {
          case 'select':
            playOscillator(600, 'sine', 0.05);
            break;
          case 'input':
            playOscillator(800, 'sine', 0.08);
            break;
          case 'erase':
            playOscillator(300, 'sine', 0.08);
            break;
          case 'error':
            playOscillator(150, 'sawtooth', 0.2);
            break;
          case 'win':
            playOscillator(400, 'sine', 0.1);
            playOscillator(500, 'sine', 0.1, ctx.currentTime + 0.1);
            playOscillator(600, 'sine', 0.1, ctx.currentTime + 0.2);
            playOscillator(800, 'sine', 0.4, ctx.currentTime + 0.3);
            break;
          default:
            break;
        }
      }, [soundEnabled]);

      useEffect(() => {
        const puzzle = PUZZLES[currentLevel];
        setInitialBoard(puzzle.map(row => [...row]));
        setBoard(puzzle.map(row => [...row]));
        setSelectedCell(null);
        setIsWon(false);
        setShowConflicts(false);
      }, [currentLevel]);

      const getConflicts = useCallback((currentBoard) => {
        const newConflicts = Array(9).fill(null).map(() => Array(9).fill(false));
        
        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) {
            const val = currentBoard[r][c];
            if (val === 0) continue;

            for (let i = 0; i < 9; i++) {
              if (i !== c && currentBoard[r][i] === val) {
                newConflicts[r][c] = true;
                newConflicts[r][i] = true;
              }
              if (i !== r && currentBoard[i][c] === val) {
                newConflicts[r][c] = true;
                newConflicts[i][c] = true;
              }
            }
            
            const blockR = Math.floor(r / 3) * 3;
            const blockC = Math.floor(c / 3) * 3;
            for (let i = 0; i < 3; i++) {
              for (let j = 0; j < 3; j++) {
                const rr = blockR + i;
                const cc = blockC + j;
                if ((rr !== r || cc !== c) && currentBoard[rr][cc] === val) {
                  newConflicts[r][c] = true;
                  newConflicts[rr][cc] = true;
                }
              }
            }
          }
        }
        return newConflicts;
      }, []);

      useEffect(() => {
        if (board.length === 0) return;
        const currentConflicts = getConflicts(board);
        setConflicts(currentConflicts);
      }, [board, getConflicts]);

      const handleCheckAnswer = useCallback(() => {
        if (board.length === 0 || isWon) return;
        
        setShowConflicts(true);
        
        const isFull = board.every(row => row.every(cell => cell !== 0));
        const hasError = conflicts.some(row => row.some(err => err));
        
        if (isFull && !hasError) {
          setIsWon(true);
          playAudio('win');
        } else {
          playAudio('error');
        }
      }, [board, conflicts, isWon, playAudio]);

      const handleInput = useCallback((num) => {
        if (isWon || !selectedCell) return;
        const { r, c } = selectedCell;
        
        if (initialBoard[r][c] !== 0) return;

        setBoard(prev => {
          const newBoard = prev.map(row => [...row]);
          newBoard[r][c] = num;
          return newBoard;
        });

        setShowConflicts(false);

        if (num === 0) {
          playAudio('erase');
        } else {
          playAudio('input');
        }
      }, [selectedCell, initialBoard, isWon, playAudio]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!selectedCell || isWon) return;
          const { r, c } = selectedCell;

          if (e.key === 'ArrowUp') setSelectedCell({ r: Math.max(0, r - 1), c });
          if (e.key === 'ArrowDown') setSelectedCell({ r: Math.min(8, r + 1), c });
          if (e.key === 'ArrowLeft') setSelectedCell({ r, c: Math.max(0, c - 1) });
          if (e.key === 'ArrowRight') setSelectedCell({ r, c: Math.min(8, c + 1) });

          if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            playAudio('select');
          }

          if (e.key >= '1' && e.key <= '9') {
            handleInput(parseInt(e.key));
          }
          if (e.key === 'Backspace' || e.key === 'Delete') {
            handleInput(0);
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedCell, handleInput, isWon, playAudio]);

      const handleRestart = () => {
        setBoard(initialBoard.map(row => [...row]));
        setSelectedCell(null);
        setIsWon(false);
        setShowConflicts(false);
      };

      const changeLevel = (delta) => {
        let newLevel = currentLevel + delta;
        if (newLevel < 0) newLevel = PUZZLES.length - 1;
        if (newLevel >= PUZZLES.length) newLevel = 0;
        setCurrentLevel(newLevel);
      };

      const getCellClassName = (r, c) => {
        const isSelected = selectedCell?.r === r && selectedCell?.c === c;
        const isInitial = initialBoard[r]?.[c] !== 0;
        const hasConflict = showConflicts && conflicts[r]?.[c];
        
        let isRelated = false;
        if (selectedCell) {
          const isSameRow = selectedCell.r === r;
          const isSameCol = selectedCell.c === c;
          const isSameBlock = Math.floor(selectedCell.r / 3) === Math.floor(r / 3) && 
                              Math.floor(selectedCell.c / 3) === Math.floor(c / 3);
          isRelated = isSameRow || isSameCol || isSameBlock;
        }

        let className = `relative flex items-center justify-center text-xl sm:text-2xl md:text-3xl font-semibold cursor-pointer select-none transition-colors duration-150
          w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14
          ${c % 3 === 2 && c !== 8 ? 'border-r-[3px] border-r-slate-800' : 'border-r border-r-slate-300'}
          ${r % 3 === 2 && r !== 8 ? 'border-b-[3px] border-b-slate-800' : 'border-b border-b-slate-300'}
          ${c === 0 ? 'border-l-[3px] border-l-slate-800' : ''}
          ${r === 0 ? 'border-t-[3px] border-t-slate-800' : ''}
          ${c === 8 ? 'border-r-[3px] border-r-slate-800' : ''}
          ${r === 8 ? 'border-b-[3px] border-b-slate-800' : ''}
        `;

        if (isSelected) {
          className += ' bg-indigo-200';
        } else if (hasConflict) {
          className += ' bg-red-100';
        } else if (isRelated) {
          className += ' bg-indigo-50';
        } else {
          className += ' bg-white hover:bg-indigo-50/50';
        }

        if (hasConflict) {
          className += ' text-red-600';
        } else if (isInitial) {
          className += ' text-slate-900';
        } else {
          className += ' text-indigo-600';
        }

        return className;
      };

      if (!board || board.length === 0 || !initialBoard || initialBoard.length === 0) return null;

      return (
        <div className="min-h-screen flex flex-col items-center py-6 px-4 font-sans">
          <div className="max-w-xl w-full flex flex-col items-center gap-6">
            
            <div className="text-center w-full relative">
              <button 
                onClick={() => setSoundEnabled(!soundEnabled)}
                className="absolute right-0 top-0 p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors"
                title={soundEnabled ? "關閉音效" : "開啟音效"}
              >
                {soundEnabled ? <Volume2 size={24} /> : <VolumeX size={24} />}
              </button>

              <div className="mb-4 mt-2">
                <h1 className="text-2xl sm:text-3xl font-bold text-slate-800 tracking-wider mb-2">康樂國小 創意科技</h1>
                <h2 className="text-xl sm:text-2xl font-semibold text-slate-600 tracking-wide">數獨(9*9)</h2>
              </div>
              
              <div className="flex items-center justify-center gap-3 mb-2">
                <button 
                  onClick={() => changeLevel(-1)}
                  className="p-2 bg-white rounded-full shadow-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-colors"
                >
                  <ChevronLeft size={24} />
                </button>
                
                <select
                  value={currentLevel}
                  onChange={(e) => setCurrentLevel(Number(e.target.value))}
                  className="bg-white border-2 border-indigo-100 text-slate-800 text-lg font-bold rounded-xl px-4 py-2 shadow-sm focus:outline-none focus:border-indigo-400 focus:ring-0 cursor-pointer appearance-none text-center min-w-[120px]"
                >
                  {PUZZLES.map((_, index) => (
                    <option key={index} value={index}>
                      題目 {index + 1}
                    </option>
                  ))}
                </select>
                
                <button 
                  onClick={() => changeLevel(1)}
                  className="p-2 bg-white rounded-full shadow-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-colors"
                >
                  <ChevronRight size={24} />
                </button>
              </div>
            </div>

            <div className="relative bg-white p-2 rounded-xl shadow-lg border border-slate-200">
              <div className="grid grid-cols-9 bg-slate-300 border-[3px] border-slate-800 rounded-sm">
                {board.map((row, r) => (
                  row.map((cell, c) => (
                    <div
                      key={`${r}-${c}`}
                      className={getCellClassName(r, c)}
                      onClick={() => {
                        if (!isWon) {
                          setSelectedCell({ r, c });
                          playAudio('select');
                        }
                      }}
                    >
                      {cell !== 0 ? cell : ''}
                    </div>
                  ))
                ))}
              </div>

              {isWon && (
                <div className="absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center rounded-xl z-10 duration-500">
                  <Trophy className="w-20 h-20 text-yellow-500 mb-4 drop-shadow-md" />
                  <h2 className="text-3xl font-bold text-slate-800 mb-2">恭喜過關！</h2>
                  <p className="text-slate-600 mb-6">您已成功解開題目 {currentLevel + 1}</p>
                  <button
                    onClick={() => changeLevel(1)}
                    className="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition-colors"
                  >
                    挑戰下一關
                  </button>
                </div>
              )}
            </div>

            <div className="w-full max-w-[320px] sm:max-w-[400px]">
              <div className="grid grid-cols-5 gap-2 mb-3">
                {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                  <button
                    key={num}
                    onClick={() => handleInput(num)}
                    className="bg-white hover:bg-indigo-50 text-indigo-700 text-2xl font-semibold py-3 rounded-xl shadow-sm border border-slate-200 transition-colors active:scale-95"
                  >
                    {num}
                  </button>
                ))}
                <button
                  onClick={() => handleInput(0)}
                  className="bg-white hover:bg-red-50 text-red-600 flex items-center justify-center py-3 rounded-xl shadow-sm border border-slate-200 transition-colors active:scale-95"
                  title="清除"
                >
                  <Eraser size={28} />
                </button>
              </div>
              
              <div className="flex justify-center w-full gap-2">
                <button
                  onClick={handleCheckAnswer}
                  className="flex-1 flex items-center justify-center gap-2 bg-indigo-600 text-white py-3 rounded-xl shadow-md hover:bg-indigo-700 transition-colors active:scale-95 font-medium"
                >
                  <CheckCircle size={20} />
                  檢查答案
                </button>
                <button
                  onClick={handleRestart}
                  className="flex-1 flex items-center justify-center gap-2 bg-slate-800 text-white py-3 rounded-xl shadow-md hover:bg-slate-700 transition-colors active:scale-95 font-medium"
                >
                  <RotateCcw size={20} />
                  重新開始
                </button>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
