<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>康樂國小創意科技 - 6x6 數獨</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

  <style>
    body { 
      background-color: #ffffff; 
      margin: 0; 
      padding: 0; 
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    
    .cell-selected {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(250, 204, 21, 0.6);
      z-index: 10;
    }
  </style>
</head>
<body class="bg-white text-slate-800">
  
  <div id="error-message" style="color: red; padding: 20px; font-weight: bold; text-align: center;"></div>
  <div id="root"></div>

  <script>
    window.addEventListener('error', function(event) {
      document.getElementById('error-message').innerText = '系統載入發生錯誤：' + event.message;
    });
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
    const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
    const IconCheckCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const IconRotate = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const IconEraser = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>;

    // 6x6 題庫 (依照圖片 1~6 題製作)
    const PUZZLE_DATA = [
      { p: "050206246003124065560421400632602010", s: "351246246153124365563421415632632514" }, // 第 1 題
      { p: "130256060304056102302460501040643021", s: "134256265314456132312465521643643521" }, // 第 2 題
      { p: "560234203005002546456100300402624051", s: "561234243615132546456123315462624351" }, // 第 3 題
      { p: "001025045316526003100652453260610500", s: "361425245316526143134652453261612534" }, // 第 4 題
      { p: "064053032461356000000536423610610340", s: "164253532461356124241536423615615342" }, // 第 5 題
      { p: "052106361052146000000614510263603540", s: "452136361452146325235614514263623541" }  // 第 6 題
    ];

    const parseGrid = (str) => {
      const grid = [];
      for (let i = 0; i < 6; i++) {
        const row = [];
        for (let j = 0; j < 6; j++) {
          const val = parseInt(str[i * 6 + j], 10);
          row.push(val === 0 ? null : val);
        }
        grid.push(row);
      }
      return grid;
    };

    const playAudio = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        if (type === 'place') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'clear') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'success') {
          const playNote = (freq, time) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.3, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(time);
            osc.stop(time + 0.2);
          };
          playNote(440, ctx.currentTime); 
          playNote(554.37, ctx.currentTime + 0.1); 
          playNote(659.25, ctx.currentTime + 0.2); 
          playNote(880, ctx.currentTime + 0.3); 
        }
      } catch (e) {
        console.log("Audio play skipped", e);
      }
    };

    const formatTime = (seconds) => {
      if (seconds < 60) return `${seconds} 秒`;
      return `${Math.floor(seconds / 60)} 分 ${seconds % 60} 秒`;
    };

    function App() {
      const [currentPuzzleIndex, setCurrentPuzzleIndex] = useState(0);
      const [board, setBoard] = useState(() => parseGrid(PUZZLE_DATA[0].p));
      const [errors, setErrors] = useState(Array(6).fill(null).map(() => Array(6).fill(false)));
      const [isComplete, setIsComplete] = useState(false);
      
      const [selectedCell, setSelectedCell] = useState(null); 
      const [activeNumber, setActiveNumber] = useState(null); 

      const [startTime, setStartTime] = useState(Date.now());
      const [timeTaken, setTimeTaken] = useState(null);

      const currentPuzzle = parseGrid(PUZZLE_DATA[currentPuzzleIndex].p);
      const currentSolution = parseGrid(PUZZLE_DATA[currentPuzzleIndex].s);

      useEffect(() => {
        setBoard(parseGrid(PUZZLE_DATA[currentPuzzleIndex].p));
        setErrors(Array(6).fill(null).map(() => Array(6).fill(false)));
        setIsComplete(false);
        setSelectedCell(null);
        setActiveNumber(null);
        setStartTime(Date.now());
        setTimeTaken(null);
      }, [currentPuzzleIndex]);

      const isBoardFull = board.every(row => row.every(cell => cell !== null));

      const fillCell = (r, c, val) => {
        const newValue = val === 'eraser' ? null : val;
        const newBoard = [...board];
        
        if (newBoard[r][c] !== newValue) {
          playAudio(newValue === null ? 'clear' : 'place');
          newBoard[r][c] = newValue;
          setBoard(newBoard);
          
          const newErrors = [...errors];
          newErrors[r][c] = false;
          setErrors(newErrors);
          setIsComplete(false);
        }
      };

      const handleCellClick = (rowIndex, colIndex) => {
        if (currentPuzzle[rowIndex][colIndex] !== null) return; 
        
        if (activeNumber !== null) {
          fillCell(rowIndex, colIndex, activeNumber);
          setSelectedCell(null); 
        } else {
          if (selectedCell?.r === rowIndex && selectedCell?.c === colIndex) {
            setSelectedCell(null);
          } else {
            setSelectedCell({ r: rowIndex, c: colIndex }); 
          }
        }
      };

      const handleNumberClick = (item) => {
        if (selectedCell !== null) {
          fillCell(selectedCell.r, selectedCell.c, item);
          setSelectedCell(null); 
          setActiveNumber(null);
        } else {
          if (activeNumber === item) {
            setActiveNumber(null);
          } else {
            setActiveNumber(item);
          }
        }
      };

      const checkSolution = () => {
        let hasError = false;
        const newErrors = Array(6).fill(null).map(() => Array(6).fill(false));

        for (let i = 0; i < 6; i++) {
          for (let j = 0; j < 6; j++) {
            if (board[i][j] !== currentSolution[i][j]) {
              newErrors[i][j] = true;
              hasError = true;
            }
          }
        }

        setErrors(newErrors);
        setSelectedCell(null); 
        setActiveNumber(null);

        if (!hasError) {
          setIsComplete(true);
          setTimeTaken(Math.floor((Date.now() - startTime) / 1000));
          playAudio('success');
        } else {
          playAudio('clear');
        }
      };

      const resetGame = () => {
        setBoard(parseGrid(PUZZLE_DATA[currentPuzzleIndex].p));
        setErrors(Array(6).fill(null).map(() => Array(6).fill(false)));
        setIsComplete(false);
        setSelectedCell(null);
        setActiveNumber(null);
        setStartTime(Date.now());
        setTimeTaken(null);
      };

      const handlePrev = () => {
        if (currentPuzzleIndex > 0) setCurrentPuzzleIndex(currentPuzzleIndex - 1);
      };

      const handleNext = () => {
        if (currentPuzzleIndex < PUZZLE_DATA.length - 1) setCurrentPuzzleIndex(currentPuzzleIndex + 1);
      };

      return (
        <div className="min-h-screen bg-white flex flex-col items-center py-6 sm:py-10 font-sans">
          <div className="max-w-md w-full bg-white p-4 sm:p-8 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.1)] border border-gray-100">
            
            <div className="text-center mb-5">
              <h1 className="text-2xl sm:text-3xl font-bold text-slate-800 mb-2">康樂國小創意科技<br/>6x6 數獨</h1>
              <div className="bg-yellow-50 text-yellow-800 p-3 rounded-lg border border-yellow-200 inline-block text-sm font-medium shadow-sm">
                👆 玩法：先點選淡藍色格子，再選下方數字！<br/>(也可以先點數字，再像蓋印章一樣點格子喔)
              </div>
            </div>

            <div className="flex items-center justify-between bg-slate-50 border border-slate-100 p-2 sm:p-3 rounded-xl mb-5">
              <button 
                onClick={handlePrev} 
                disabled={currentPuzzleIndex === 0}
                className="p-2 flex items-center gap-1 text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg disabled:opacity-30 transition-colors font-bold text-sm"
              >
                <IconChevronLeft />
                <span className="hidden sm:inline">上一題</span>
              </button>
              
              <select 
                value={currentPuzzleIndex} 
                onChange={(e) => setCurrentPuzzleIndex(Number(e.target.value))}
                className="bg-white border-2 border-slate-300 text-slate-800 text-base sm:text-lg font-bold py-1.5 px-3 sm:px-6 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center"
              >
                {PUZZLE_DATA.map((_, idx) => (
                  <option key={idx} value={idx}>第 {idx + 1} 題</option>
                ))}
              </select>

              <button 
                onClick={handleNext} 
                disabled={currentPuzzleIndex === PUZZLE_DATA.length - 1}
                className="p-2 flex items-center gap-1 text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg disabled:opacity-30 transition-colors font-bold text-sm"
              >
                <span className="hidden sm:inline">下一題</span>
                <IconChevronRight />
              </button>
            </div>

            {/* 6x6 數獨網格區 */}
            <div className="mb-6 flex justify-center">
              <div className="grid grid-cols-6 border-4 border-slate-800 rounded-lg bg-slate-800 gap-[1px]">
                {board.map((row, rowIndex) => (
                  row.map((cell, colIndex) => {
                    const isInitial = currentPuzzle[rowIndex][colIndex] !== null;
                    const isError = errors[rowIndex][colIndex];
                    const isSelected = selectedCell?.r === rowIndex && selectedCell?.c === colIndex;
                    
                    // 6x6 數獨的粗線邏輯 (每列 3 格，每行 2 格)
                    const borderClasses = `
                      ${colIndex === 2 ? 'border-r-4 border-r-slate-800' : ''}
                      ${rowIndex === 1 || rowIndex === 3 ? 'border-b-4 border-b-slate-800' : ''}
                    `;
                    
                    let bgClass = "bg-[#e0f2fe]";
                    let textClass = "text-blue-900";
                    
                    if (isInitial) { 
                      bgClass = "bg-white"; 
                      textClass = "text-slate-900"; 
                    } else if (isError) { 
                      bgClass = "bg-red-500"; 
                      textClass = "text-white"; 
                    } else if (cell !== null) { 
                      bgClass = "bg-blue-100"; 
                      textClass = "text-blue-900"; 
                    }

                    if (isSelected) {
                      bgClass = "bg-yellow-100 border-2 border-yellow-400 cell-selected";
                    }

                    return (
                      <div
                        key={`${rowIndex}-${colIndex}`}
                        className={`w-10 h-10 sm:w-14 sm:h-14 flex items-center justify-center text-2xl sm:text-3xl font-bold cursor-pointer transition-all duration-150 ${borderClasses} ${bgClass} ${textClass}`}
                        onClick={() => handleCellClick(rowIndex, colIndex)}
                      >
                        {cell}
                      </div>
                    );
                  })
                ))}
              </div>
            </div>

            {/* 數字與工具盤 (擴增為 1~6) */}
            {!isComplete && (
              <div className="mb-6">
                <div className="flex justify-center flex-wrap gap-2">
                  {[1, 2, 3, 4, 5, 6, 'eraser'].map(item => (
                    <button
                      key={item}
                      onClick={() => handleNumberClick(item)}
                      className={`
                        w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center text-xl font-bold shadow-sm
                        transition-transform transform active:scale-90
                        ${activeNumber === item 
                          ? (item === 'eraser' ? 'bg-red-500 text-white shadow-red-500/50 scale-110 ring-4 ring-red-200' : 'bg-blue-600 text-white shadow-blue-500/50 scale-110 ring-4 ring-blue-200') 
                          : 'bg-white text-slate-700 border-2 border-slate-200 hover:border-blue-400'}
                      `}
                    >
                      {item === 'eraser' ? <IconEraser /> : item}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* 控制按鈕區 */}
            <div className="flex flex-col gap-3 mt-4">
              {!isComplete ? (
                <button
                  onClick={checkSolution}
                  disabled={!isBoardFull}
                  className={`
                    w-full py-4 rounded-xl font-bold text-lg transition-all duration-300 flex items-center justify-center gap-2
                    ${isBoardFull 
                      ? 'bg-green-500 hover:bg-green-600 text-white shadow-[0_4px_15px_rgba(34,197,94,0.4)] transform hover:-translate-y-1' 
                      : 'bg-slate-200 text-slate-400 cursor-not-allowed'}
                  `}
                >
                  <IconCheckCircle />
                  完成送出
                </button>
              ) : (
                <div className="flex flex-col gap-3">
                  <div className="bg-green-100 border-2 border-green-500 text-green-700 p-4 rounded-xl text-center font-bold text-lg animate-pulse flex flex-col items-center gap-2">
                    <div className="flex items-center gap-2">
                      <IconCheckCircle size={32} className="text-green-600" />
                      <span>恭喜你！完全答對了！</span>
                    </div>
                    {timeTaken !== null && (
                      <span className="text-sm font-medium mt-1 bg-green-200 text-green-800 px-4 py-1 rounded-full shadow-sm">
                        ⏱️ 挑戰時間：{formatTime(timeTaken)}
                      </span>
                    )}
                  </div>
                  
                  {currentPuzzleIndex < PUZZLE_DATA.length - 1 && (
                    <button
                      onClick={handleNext}
                      className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-lg shadow-[0_4px_15px_rgba(37,99,235,0.4)] transform hover:-translate-y-1 transition-all flex items-center justify-center gap-2"
                    >
                      進入下一題 <IconChevronRight />
                    </button>
                  )}
                </div>
              )}

              <button
                onClick={resetGame}
                className="w-full py-3 rounded-xl font-bold text-slate-500 bg-slate-50 border-2 border-slate-200 hover:bg-slate-100 transition-colors flex items-center justify-center gap-2"
              >
                <IconRotate />
                重新開始
              </button>
            </div>

            {errors.some(row => row.some(err => err)) && !isComplete && (
              <div className="mt-4 p-3 bg-red-50 rounded-lg border border-red-200 flex items-center justify-center gap-2 text-red-600 font-medium text-sm">
                <IconAlert />
                <span>有紅色的錯誤格子，請選橡皮擦清除或直接蓋掉它！</span>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
